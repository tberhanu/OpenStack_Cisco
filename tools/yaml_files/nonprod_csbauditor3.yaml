apiVersion: "v1"
kind: "PersistentVolumeClaim"
metadata:
  name: "nonprodcsbauditor3"
spec:
  storageClassName: "standard"
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "1Gi"

---
apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name: "nonprodcsbauditor3"
spec:
  replicas: 1
  selector:
    matchLabels:
      name: "nonprodcsbauditor3"
  template:
    metadata:
      labels:
        name: "nonprodcsbauditor3"
    spec:
      containers:
        -
          name: "nonprodcsbauditor3"
          image: "containers.cisco.com/csb-cnt-dev/csbauditor:csbauditor_nonprod"

          volumeMounts:
            - name: "storage"
              mountPath: "/opt/app-root/src/logs"

          imagePullPolicy: "Always"

          securityContext:
            capabilities: {}
            privileged: false
      volumes:
        -
          name: "storage"
          persistentVolumeClaim:
           claimName: "nonprodcsbauditor3"

      restartPolicy: "Always"
      dnsPolicy: "ClusterFirst"
  Triggers:
    -
      type: "ConfigChange"
  strategy:
    type: "RollingUpdate"
    rollingParams:
      updatePeriodSeconds: 1
      intervalSeconds: 1
      timeoutSeconds: 420
